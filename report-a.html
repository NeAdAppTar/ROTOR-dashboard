<div class="main-content">

<h1>Отчёты водителей</h1>

<div class="table-card">
<table class="styled-table">
<thead>
<tr>
<th>ФИО</th>
<th>Дата</th>
<th>Маршрут</th>
<th>Круги</th>
<th>Пасс.</th>
<th>Доказательство</th>
<th>Статус</th>
<th>Действия</th>
</tr>
</thead>
<tbody id="reportsBody"></tbody>
</table>

</main>
</div>

<script>
  const pageAccess = ["Директор", "Технический администратор"];

const COMPANY = "rotor";

/* =========================
   Загрузка отчётов
========================= */

async function loadReports() {
  const res = await fetch(`https://api.rotorbus.ru/reports/${COMPANY}`);
  const data = await res.json();

  reportsBody.innerHTML = "";

  data.reports.forEach(r => {
    const tr = document.createElement("tr");

    if (r.status === "verified") tr.className = "status-ok";
    if (r.status === "rejected") tr.className = "status-rej";
    if (r.status === "not_verified") tr.className = "status-not";

    let statusClass = "";
let badgeClass = "";
let statusText = "";

if (r.status === "verified") {
  statusClass = "status-ok";
  badgeClass = "badge-ok";
  statusText = "Подтверждён";
}

if (r.status === "rejected") {
  statusClass = "status-rej";
  badgeClass = "badge-rej";
  statusText = "Отклонён";
}

if (r.status === "not_verified") {
  statusClass = "status-not";
  badgeClass = "badge-not";
  statusText = "Ожидает";
}

tr.className = statusClass;

tr.innerHTML = `
  <td>${r.user_name}</td>
  <td>${r.date}</td>
  <td>${r.route}</td>
  <td>${r.num_round_trips}</td>
  <td>${r.num_passengers}</td>
  <td>
    ${r.proof ? `<a class="proof-link" href="${r.proof}" target="_blank">📎</a>` : ""}
  </td>
  <td>
    <span class="status-badge ${badgeClass}">
      ${statusText}
    </span>
  </td>
  <td class="actions">
    ${
      r.status === "not_verified"
        ? `
          <button class="btn-ok" onclick="verify(${r.id})">✔</button>
          <button class="btn-rej" onclick="reject(${r.id})">✖</button>
        `
        : ""
    }
    <button class="btn-del" onclick="del(${r.id})">🗑</button>
  </td>
`;

    reportsBody.appendChild(tr);
  });
}

/* =========================
   Действия
========================= */

async function verify(id) {
  await fetch(`https://api.rotorbus.ru/report/verify/${COMPANY}/${id}`, {
    method: "POST"
  });
  loadReports();
}

async function reject(id) {
  await fetch(`https://api.rotorbus.ru/report/reject/${COMPANY}/${id}`, {
    method: "POST"
  });
  loadReports();
}

async function del(id) {
  if (!confirm("Удалить отчёт?")) return;

  await fetch(`https://api.rotorbus.ru/report/${COMPANY}/${id}`, {
    method: "DELETE"
  });
  loadReports();
}

/* =========================
   Инициализация
========================= */

loadReports();
</script>
