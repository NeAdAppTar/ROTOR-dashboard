<script>
const pageAccess = ["Директор", "Технический администратор"];

const API_BASE = "https://api.rotorbus.ru";
const COMPANY = "rotor";

const table = document.getElementById("employeesTable");

function escapeHtml(str){
return String(str || "")
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;");
}

async function fetchJson(url){
const res = await fetch(url);
return res.json();
}

function getPromotion(user,trips){

if(user.post === "Водитель 3 класса"){

if(trips >= 50){
return {
eligible:true,
next:"Водитель 2 класса",
text:"Можно повысить"
};
}

return {
eligible:false,
text:"Нужно 50 кругорейсов"
};

}

if(user.post === "Водитель 2 класса"){

if(trips >= 120){
return {
eligible:true,
next:"Водитель 1 класса",
text:"Можно повысить"
};
}

return {
eligible:false,
text:"Нужно 120 кругорейсов"
};

}

return {eligible:false,text:"Повышение не предусмотрено"};

}

async function promoteUser(user,newPost){

if(!confirm(`Повысить ${user.name} до "${newPost}" ?`)) return;

const res = await fetch(`${API_BASE}/user/${COMPANY}/${user.id}`,{
method:"PUT",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
post:newPost
})
});

const data = await res.json();

if(data.status === "ok"){
loadEmployees();
}else{
alert(data.message);
}

}

async function loadEmployees(){

table.innerHTML = "<tr><td colspan='5'>Загрузка...</td></tr>";

try{

const usersData = await fetchJson(`${API_BASE}/users/${COMPANY}`);
const statsData = await fetchJson(`${API_BASE}/statistics/${COMPANY}`);

const users = usersData.users || [];
const stats = statsData.statistics || [];

table.innerHTML = "";

users.forEach(user => {

const stat = stats.find(s => s.user_name === user.name) || {};
const trips = Number(stat.total_round_trips || 0);

const promo = getPromotion(user,trips);

let action = `<span class="status-badge badge-not">Недоступно</span>`;

if(promo.eligible){

action = `
<button class="btn-ok"
onclick='promoteUser(${JSON.stringify(user)},"${promo.next}")'>
⬆ Повысить
</button>
`;

}

const tr = document.createElement("tr");

tr.innerHTML = `
<td>${escapeHtml(user.name)}</td>

<td>${escapeHtml(user.post)}</td>

<td>${trips}</td>

<td>
<span class="status-badge ${
promo.eligible ? 'badge-ok' : 'badge-not'
}">
${promo.text}
</span>
</td>

<td>${action}</td>
`;

table.appendChild(tr);

});

if(!users.length){
table.innerHTML="<tr><td colspan='5'>Нет сотрудников</td></tr>";
}

}catch(err){

table.innerHTML="<tr><td colspan='5'>Ошибка загрузки</td></tr>";
console.error(err);

}

}

loadEmployees();

</script>
